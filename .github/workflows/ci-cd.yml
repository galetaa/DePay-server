name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build and Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - wallet-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.24'

      - name: Build and Test ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          go mod download
          CGO_ENABLED=0 go build -o app .
          go test -v ./...

  docker_build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build_and_test
    strategy:
      matrix:
        service:
          - user-service
          - wallet-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image for ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/${{ matrix.service }}:latest .

      - name: Login to Container Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} --username ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Push Docker image for ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/${{ matrix.service }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.25.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=$(pwd)/kubeconfig

      - name: Deploy manifests to Kubernetes
        run: |
          kubectl apply -f k8s/
