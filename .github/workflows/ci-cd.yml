name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build and Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - wallet-service
          - transaction-core-service
          - transaction-validation-service
          - gas-info-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.24'

      - name: Build and Test ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          go mod download
          CGO_ENABLED=0 go build -o app ./cmd/${{ matrix.service }}/main.go
          go test -v ./tests
