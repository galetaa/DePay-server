openapi: 3.0.3
info:
  title: DePay API
  version: 0.2.0
  description: Coursework-ready MVP API for DePay services.
servers:
  - url: http://localhost:8090
    description: Admin/analytics service
  - url: http://localhost:8080
    description: User service
  - url: http://localhost:8083
    description: Merchant service
  - url: http://localhost:8084
    description: Wallet service
  - url: http://localhost:8085
    description: Transaction core service
paths:
  /health:
    get:
      summary: Service health check
      responses:
        "200":
          description: Service is healthy

  /api/user/register:
    post:
      tags: [User]
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"
      responses:
        "200":
          description: User and tokens
  /api/user/login:
    post:
      tags: [User]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
      responses:
        "200":
          description: User and tokens
  /api/user/refresh-token:
    post:
      tags: [User]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: New access token
  /api/user/me:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: Current user profile
      responses:
        "200":
          description: User profile
    put:
      tags: [User]
      security:
        - bearerAuth: []
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Updated profile
  /api/user/kyc:
    post:
      tags: [User]
      security:
        - bearerAuth: []
      summary: Submit KYC application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCSubmitRequest"
      responses:
        "202":
          description: KYC pending
  /api/user/kyc/status:
    get:
      tags: [User]
      security:
        - bearerAuth: []
      summary: Get current KYC status
      responses:
        "200":
          description: KYC status

  /api/merchant/register:
    post:
      tags: [Merchant]
      summary: Register merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterRequest"
      responses:
        "201":
          description: Merchant and tokens
  /api/merchant/login:
    post:
      tags: [Merchant]
      summary: Login merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantLoginRequest"
      responses:
        "200":
          description: Merchant and tokens
  /api/merchant/me:
    get:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Current merchant profile
      responses:
        "200":
          description: Merchant profile
  /api/merchant/verification:
    post:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Submit merchant verification
      responses:
        "202":
          description: Verification pending
  /api/merchant/verification/status:
    get:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Merchant verification status
      responses:
        "200":
          description: Verification status
  /api/merchant/invoices:
    post:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Create invoice
      responses:
        "201":
          description: Invoice created
    get:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: List invoices
      responses:
        "200":
          description: Invoices
  /api/merchant/terminals:
    post:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Create terminal
      responses:
        "201":
          description: Terminal created
    get:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: List terminals
      responses:
        "200":
          description: Terminals
  /api/merchant/webhooks:
    post:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Register merchant webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook registered
    get:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: List merchant webhooks
      responses:
        "200":
          description: Webhooks
  /api/merchant/webhooks/{webhook_id}:
    delete:
      tags: [Merchant]
      security:
        - bearerAuth: []
      summary: Delete merchant webhook
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /api/wallets:
    post:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Create wallet
      responses:
        "201":
          description: Wallet created
    get:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: List wallets
      responses:
        "200":
          description: Wallet list
  /api/wallets/{wallet_id}:
    get:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Get wallet
      parameters:
        - $ref: "#/components/parameters/WalletID"
      responses:
        "200":
          description: Wallet
    delete:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Delete wallet
      parameters:
        - $ref: "#/components/parameters/WalletID"
      responses:
        "204":
          description: Deleted
  /api/wallets/{wallet_id}/balances:
    get:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Wallet balances
      parameters:
        - $ref: "#/components/parameters/WalletID"
      responses:
        "200":
          description: Balances
  /api/wallets/{wallet_id}/sync:
    post:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Sync wallet balance from configured blockchain provider
      parameters:
        - $ref: "#/components/parameters/WalletID"
      responses:
        "202":
          description: Wallet synced
  /api/wallets/{address}/balance:
    get:
      tags: [Wallet]
      security:
        - bearerAuth: []
      summary: Balance by wallet address
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Balance

  /api/transaction/initiate:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Initiate transaction
      responses:
        "200":
          description: Transaction initiated
  /api/transaction/submit:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Submit transaction
      responses:
        "200":
          description: Transaction submitted
  /api/transaction/validate:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Validate signed transaction
      responses:
        "200":
          description: Validation success
  /api/transaction/{transaction_id}:
    get:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Get transaction
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction
  /api/transaction/{transaction_id}/status:
    get:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Get transaction status
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction status
  /api/transaction/{transaction_id}/cancel:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Cancel transaction
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Cancelled
  /api/transaction/{transaction_id}/submit:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Move transaction to submitted
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction submitted
  /api/transaction/{transaction_id}/validate:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Move transaction to validated
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction validated
  /api/transaction/{transaction_id}/broadcast:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Broadcast transaction using configured blockchain RPC provider
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction broadcasted
  /api/transaction/{transaction_id}/confirm:
    post:
      tags: [Transaction]
      security:
        - bearerAuth: []
      summary: Mark broadcasted transaction as confirmed
      parameters:
        - $ref: "#/components/parameters/TransactionID"
      responses:
        "200":
          description: Transaction confirmed

  /api/transactions/gas-info:
    get:
      tags: [Gas]
      summary: Current gas info
      parameters:
        - name: network
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Gas info
  /api/gas-info/history:
    get:
      tags: [Gas]
      summary: Gas history
      responses:
        "200":
          description: Gas history

  /api/kyc:
    post:
      tags: [KYC]
      security:
        - bearerAuth: []
      summary: Process KYC request with configured mock or HTTP provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCProviderRequest"
      responses:
        "200":
          description: KYC provider response

  /api/admin/tables:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: List allowed tables and views
      responses:
        "200":
          description: Table names
  /api/admin/tables/{table_name}:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Read rows from allowed table or view
      parameters:
        - name: table_name
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Table rows
  /api/admin/functions/{function_name}/execute:
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Execute allowed SQL function
      parameters:
        - name: function_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                params:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Function result
  /api/admin/audit-logs:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Audit logs
      responses:
        "200":
          description: Audit rows
  /api/admin/risk-alerts:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Risk alerts
      responses:
        "200":
          description: Risk rows
  /api/admin/demo/invoices:
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Create demo invoice
      responses:
        "201":
          description: Demo invoice
  /api/admin/demo/payments:
    post:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Submit demo payment
      responses:
        "200":
          description: Demo transaction
  /api/analytics/store-turnover:
    get:
      tags: [Analytics]
      security:
        - bearerAuth: []
      summary: Store turnover chart data
      responses:
        "200":
          description: Turnover rows
  /api/analytics/transaction-statuses:
    get:
      tags: [Analytics]
      security:
        - bearerAuth: []
      summary: Transaction status chart data
      responses:
        "200":
          description: Status rows
  /api/analytics/failed-transactions:
    get:
      tags: [Analytics]
      security:
        - bearerAuth: []
      summary: Failed transaction chart data
      responses:
        "200":
          description: Failed rows
  /api/analytics/rpc-health:
    get:
      tags: [Analytics]
      security:
        - bearerAuth: []
      summary: RPC health chart data
      responses:
        "200":
          description: RPC rows
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WalletID:
      name: wallet_id
      in: path
      required: true
      schema:
        type: string
    TransactionID:
      name: transaction_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    UserRegisterRequest:
      type: object
      required: [email, first_name, last_name, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
          format: password
    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    UserProfileUpdateRequest:
      type: object
      properties:
        username:
          type: string
        phone_number:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        address:
          type: string
    KYCSubmitRequest:
      type: object
      required: [document_type, document_url]
      properties:
        document_type:
          type: string
        document_url:
          type: string
    KYCProviderRequest:
      type: object
      required: [user_id, document_type, document_data]
      properties:
        user_id:
          type: string
        document_type:
          type: string
        document_data:
          type: string
    MerchantRegisterRequest:
      type: object
      required: [owner_email, password, store_name]
      properties:
        owner_email:
          type: string
          format: email
        password:
          type: string
          format: password
        store_name:
          type: string
        legal_name:
          type: string
    MerchantLoginRequest:
      type: object
      required: [owner_email, password]
      properties:
        owner_email:
          type: string
          format: email
        password:
          type: string
          format: password
    CreateWebhookRequest:
      type: object
      required: [url, secret]
      properties:
        url:
          type: string
          format: uri
        event_types:
          type: array
          items:
            type: string
          example:
            - transaction.confirmed
            - transaction.failed
        secret:
          type: string
          format: password
