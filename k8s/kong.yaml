apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
data:
  kong.yml: |
    _format_version: "1.1"
    _transform: true
    services:
      - name: user-service
        url: http://user-service
        routes:
          - name: user-api
            paths: ["/api/user"]
            strip_path: false
      - name: merchant-service
        url: http://merchant-service
        routes:
          - name: merchant-api
            paths: ["/api/merchant"]
            strip_path: false
      - name: wallet-service
        url: http://wallet-service
        routes:
          - name: wallet-api
            paths: ["/api/wallets"]
            strip_path: false
      - name: transaction-core-service
        url: http://transaction-core-service
        routes:
          - name: transaction-api
            paths: ["/api/transaction"]
            strip_path: false
      - name: transaction-validation-service
        url: http://transaction-validation-service
        routes:
          - name: validation-api
            paths: ["/api/transaction/validate"]
            strip_path: false
      - name: gas-info-service
        url: http://gas-info-service
        routes:
          - name: gas-api
            paths: ["/api/transactions/gas-info", "/api/gas-info"]
            strip_path: false
      - name: kyc-service
        url: http://kyc-service
        routes:
          - name: kyc-api
            paths: ["/api/kyc"]
            strip_path: false
      - name: admin-service
        url: http://admin-service
        routes:
          - name: admin-api
            paths: ["/api/admin", "/api/analytics"]
            strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Authorization", "Content-Type"]
      - name: rate-limiting
        config:
          minute: 1200
          policy: local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  labels:
    app: kong
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
      - name: kong
        image: kong:2.7
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: "/kong/kong.yml"
        - name: KONG_PROXY_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_ADMIN_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_PROXY_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
        ports:
        - containerPort: 8000
          name: proxy
        - containerPort: 8443
          name: proxy-ssl
        - containerPort: 8001
          name: admin
        - containerPort: 8444
          name: admin-ssl
        volumeMounts:
        - name: kong-config-volume
          mountPath: /kong/kong.yml
          subPath: kong.yml
        readinessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 20
          periodSeconds: 20
      volumes:
      - name: kong-config-volume
        configMap:
          name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
spec:
  selector:
    app: kong
  ports:
  - name: proxy
    port: 8000
    targetPort: 8000
  - name: proxy-ssl
    port: 8443
    targetPort: 8443
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
spec:
  selector:
    app: kong
  ports:
  - name: admin
    port: 8001
    targetPort: 8001
  - name: admin-ssl
    port: 8444
    targetPort: 8444
  type: ClusterIP
