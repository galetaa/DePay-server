apiVersion: v1
kind: ConfigMap
metadata:
  name: depay-service-config
data:
  REDIS_ADDR: redis:6379
  SKIP_RABBITMQ: "false"
  WEBHOOK_DELIVERY_MODE: http
  WEBHOOK_DELIVERY_TIMEOUT_MS: "5000"
  BLOCKCHAIN_RPC_TIMEOUT_MS: "10000"
  KYC_PROVIDER_TIMEOUT_MS: "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: depay-app-secret
type: Opaque
stringData:
  DATABASE_URL: postgres://myuser:mypassword@postgres:5432/mydatabase?sslmode=disable
  JWT_SECRET: change-me-in-production
  RABBITMQ_URL: amqp://myuser:mypassword@rabbitmq:5672/
  BLOCKCHAIN_RPC_URL: ""
  WALLET_BALANCE_RPC_URL: ""
  KYC_PROVIDER_URL: ""
  KYC_PROVIDER_API_KEY: ""
  GRAFANA_ADMIN_PASSWORD: change-me-in-production
  VAULT_DEV_ROOT_TOKEN_ID: change-me-in-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-validation-service
  labels:
    app: transaction-validation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-validation-service
  template:
    metadata:
      labels:
        app: transaction-validation-service
    spec:
      containers:
        - name: transaction-validation-service
          image: myregistry/transaction-validation-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: depay-app-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: depay-app-secret
                  key: JWT_SECRET
          readinessProbe: &readiness8081
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe: &liveness8081
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-validation-service
spec:
  selector:
    app: transaction-validation-service
  ports:
    - port: 80
      targetPort: 8081
---
