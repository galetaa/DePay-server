services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-myuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mypassword}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:2.7
    profiles: ["gateway"]
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/kong/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"   # Proxy (HTTP)
      - "8443:8443"   # Proxy (HTTPS)
      - "8001:8001"   # Admin API (HTTP)
      - "8444:8444"   # Admin API (HTTPS)
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/user-service
    command: go run ./cmd/user-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8080
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  transaction-validation-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/transaction-validation-service
    command: go run ./cmd/transaction-validation-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8081
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  gas-info-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/gas-info-service
    command: go run ./cmd/gas-info-service
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GAS_PROVIDER_URL: ${GAS_PROVIDER_URL:-}
      PORT: 8082
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy

  admin-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/admin-service
    command: go run ./cmd/admin-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8090
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

  merchant-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/merchant-service
    command: go run ./cmd/merchant-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8083
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  wallet-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/wallet-service
    command: go run ./cmd/wallet-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WALLET_BALANCE_RPC_URL: ${WALLET_BALANCE_RPC_URL:-}
      WALLET_BALANCE_RPC_TIMEOUT_MS: ${WALLET_BALANCE_RPC_TIMEOUT_MS:-10000}
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8084
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  transaction-core-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/transaction-core-service
    command: go run ./cmd/transaction-core-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-myuser}:${RABBITMQ_DEFAULT_PASS:-mypassword}@rabbitmq:5672/
      SKIP_RABBITMQ: ${SKIP_RABBITMQ:-false}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-}
      BLOCKCHAIN_RPC_TIMEOUT_MS: ${BLOCKCHAIN_RPC_TIMEOUT_MS:-10000}
      WEBHOOK_DELIVERY_MODE: ${WEBHOOK_DELIVERY_MODE:-log}
      WEBHOOK_DELIVERY_TIMEOUT_MS: ${WEBHOOK_DELIVERY_TIMEOUT_MS:-5000}
      JWT_SECRET: ${JWT_SECRET:-change_me_for_local_dev}
      PORT: 8085
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  kyc-service:
    image: golang:1.24
    profiles: ["backend"]
    working_dir: /app/kyc-service
    command: go run ./cmd/kyc-service
    environment:
      KYC_PROVIDER_URL: ${KYC_PROVIDER_URL:-}
      KYC_PROVIDER_API_KEY: ${KYC_PROVIDER_API_KEY:-}
      KYC_PROVIDER_TIMEOUT_MS: ${KYC_PROVIDER_TIMEOUT_MS:-5000}
      PORT: 8086
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8086:8086"

  web:
    image: node:22
    profiles: ["web"]
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8090}
    volumes:
      - .:/app
      - web-node-modules:/app/apps/web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - admin-service

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  vault:
    image: hashicorp/vault:1.17
    profiles: ["secrets"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-depay-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/file

volumes:
  pgdata:
  go-mod-cache:
  go-build-cache:
  web-node-modules:
  prometheus-data:
  grafana-data:
  vault-data:
